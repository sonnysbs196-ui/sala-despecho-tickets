<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala De Despecho - Vol. 11 | Tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700;900&family=Outfit:wght@400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Outfit', sans-serif;
        }

        h1, h2, h3, .big-text {
            font-family: 'Fredoka', sans-serif;
            font-weight: 900;
        }

        body {
            background: #1a1a1a;
        }

        .cream {
            color: #F5E6D3;
        }

        .gold {
            color: #F4C430;
        }

        .orange-bg {
            background: #E8650A;
        }

        .purple-bg {
            background: #2D1B4E;
        }

        .poster-border {
            border: 8px solid #F4C430;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .poster-card {
            background: #F5E6D3;
            border: 6px solid #2D1B4E;
            border-radius: 8px;
            padding: 24px;
        }

        .big-text-cream {
            font-size: 3.5rem;
            font-weight: 900;
            color: #F5E6D3;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.4), -1px -1px 0px rgba(0, 0, 0, 0.2);
            letter-spacing: -1px;
        }

        .btn-cream {
            background: #F5E6D3;
            color: #2D1B4E;
            font-weight: 900;
            border: 4px solid #2D1B4E;
            box-shadow: 0 6px 0px #2D1B4E, 0 8px 16px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .btn-cream:active {
            box-shadow: 0 2px 0px #2D1B4E;
            transform: translateY(4px);
        }

        .btn-cream:hover {
            background: #FFF0E0;
        }

        .btn-orange {
            background: #E8650A;
            color: #F5E6D3;
            font-weight: 900;
            border: 4px solid #F4C430;
            box-shadow: 0 6px 0px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .btn-orange:active {
            box-shadow: 0 2px 0px rgba(0, 0, 0, 0.3);
            transform: translateY(4px);
        }

        .btn-orange:hover {
            background: #F07010;
        }

        .ticket-card {
            background: #F5E6D3;
            border: 6px solid #2D1B4E;
            border-radius: 8px;
            padding: 24px;
            position: relative;
            transition: all 0.3s ease;
        }

        .ticket-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.3);
        }

        .ticket-card.selected {
            border-color: #F4C430;
            box-shadow: 0 0 0 4px #F4C430, 0 16px 32px rgba(244, 196, 48, 0.3);
        }

        .price-huge {
            font-size: 4rem;
            font-weight: 900;
            color: #E8650A;
            line-height: 1;
        }

        .badge {
            background: #E8650A;
            color: #F5E6D3;
            font-weight: 900;
            border: 3px solid #F4C430;
            padding: 8px 12px;
            display: inline-block;
            transform: rotate(-2deg);
        }

        header {
            background: #2D1B4E;
            border-bottom: 6px solid #E8650A;
        }

        .section-divider {
            height: 4px;
            background: linear-gradient(90deg, #E8650A 0%, #F4C430 50%, #E8650A 100%);
            margin: 32px 0;
        }
    </style>
</head>
<body class="antialiased">
    <div id="app"></div>

    <script>
        let state = {
            selectedTicket: null,
            quantity: 1,
            showCheckout: false
        };

        const tickets = [
            {
                id: 'beer',
                name: 'Grito Sagrado',
                tagline: 'Ticket + Cerveza',
                priceBundle: 22,
                priceTicket: 19.99,
                priceDrink: 6,
                savings: 4,
                badge: '⭐ POPULAR',
                copy: 'A ese que te dejó, le debemos esta cerveza'
            },
            {
                id: 'bottle',
                name: 'Redención Final',
                tagline: 'Ticket + Botella',
                priceBundle: 28,
                priceTicket: 19.99,
                priceDrink: 8,
                savings: 0,
                badge: '🍾 VIP',
                copy: 'Querida... yo sí volví, pero por la botella'
            },
            {
                id: 'double',
                name: 'Alma Libre',
                tagline: 'Ticket + 2 Bebidas',
                priceBundle: 33,
                priceTicket: 19.99,
                priceDrink: 12,
                savings: -1,
                badge: '🔥 BEAST',
                copy: 'No viniste para sufrir, viniste a beber'
            }
        ];

        function selectTicket(id) {
            state.selectedTicket = id;
            state.quantity = 1;
            render();
        }

        function updateQuantity(delta) {
            state.quantity = Math.max(1, state.quantity + delta);
            render();
        }

        function toggleCheckout() {
            state.showCheckout = !state.showCheckout;
            render();
        }

        function render() {
            const selected = tickets.find(t => t.id === state.selectedTicket);
            const daysUntil = Math.ceil((new Date('2026-04-17') - new Date()) / (1000 * 60 * 60 * 24));

            document.getElementById('app').innerHTML = `
                <div style="background: #1a1a1a; min-height: 100vh;">
                    <!-- Header -->
                    <header class="sticky top-0 z-50">
                        <div class="max-w-7xl mx-auto px-4 py-6 flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="text-5xl">🎤</div>
                                <h1 class="big-text-cream text-3xl">SALA DESPECHO</h1>
                            </div>
                            <div class="badge text-2xl">Vol. 11</div>
                        </div>
                    </header>

                    <!-- Hero -->
                    <section class="purple-bg py-24">
                        <div class="max-w-5xl mx-auto px-4">
                            <div class="poster-border rounded-xl p-12 mb-8" style="background: #E8650A;">
                                <h2 class="big-text-cream text-6xl text-center mb-6">
                                    NI TAN SANTX<br/>NI TAN TONTX
                                </h2>
                                <p class="cream text-center text-2xl font-bold mb-8">
                                    Ya cumplimos la penitencia.<br/>Ahora toca la resurrección.
                                </p>
                                <div class="grid grid-cols-3 gap-4 text-center">
                                    <div class="poster-card">
                                        <p class="text-xs font-bold text-gray-700 mb-2">CUÁNDO</p>
                                        <p class="text-2xl font-black">Viernes 17 Abril</p>
                                        <p class="text-sm text-gray-600">6:00 PM</p>
                                    </div>
                                    <div class="poster-card">
                                        <p class="text-xs font-bold text-gray-700 mb-2">DÓNDE</p>
                                        <p class="text-2xl font-black">Simmons Bar</p>
                                        <p class="text-sm text-gray-600">Holborn, London</p>
                                    </div>
                                    <div class="poster-card">
                                        <p class="text-xs font-bold text-gray-700 mb-2">FALTAN</p>
                                        <p class="big-text-cream text-4xl">${daysUntil}</p>
                                        <p class="text-sm text-gray-600">DÍAS</p>
                                    </div>
                                </div>
                            </div>

                            <div class="text-center">
                                <div class="badge text-xl mb-4">⚪ DRESS CODE: BLANCO TOTAL ⚪</div>
                                <p class="cream text-lg font-semibold">Vístete de inocencia… aunque estés lista para dedicarle una de Paquita</p>
                            </div>
                        </div>
                    </section>

                    <div class="section-divider"></div>

                    <!-- Tickets -->
                    <section class="purple-bg py-24">
                        <div class="max-w-7xl mx-auto px-4">
                            <h2 class="big-text-cream text-5xl text-center mb-4">ELIGE TU ENTRADA</h2>
                            <p class="cream text-center text-lg font-semibold mb-12">Cada ticket viene con bebida. Normalmente costaría más.</p>

                            <div class="grid md:grid-cols-3 gap-8">
                                ${tickets.map((t) => `
                                    <div
                                        onclick="selectTicket('${t.id}')"
                                        class="ticket-card ${state.selectedTicket === t.id ? 'selected' : ''}"
                                        style="cursor: pointer;"
                                    >
                                        <div class="badge mb-4">${t.badge}</div>
                                        
                                        <h3 class="text-3xl font-black mb-1">${t.name}</h3>
                                        <p class="text-sm text-gray-600 font-bold mb-4">${t.tagline}</p>

                                        <p class="italic text-gray-700 font-semibold mb-6">"${t.copy}"</p>

                                        <div class="mb-6 pb-6 border-b-4 border-orange-400">
                                            <p class="price-huge">£${t.priceBundle}</p>
                                            <p class="text-xs text-gray-600 font-bold">vs £${(t.priceTicket + t.priceDrink).toFixed(2)} si compras por separado</p>
                                            ${t.savings > 0 ? `<p class="text-sm font-black text-orange-600">💰 Ahorras £${t.savings}</p>` : ''}
                                        </div>

                                        <div class="space-y-2 mb-6 pb-6 border-b-4 border-orange-400">
                                            <div class="flex justify-between text-sm font-bold">
                                                <span>Ticket</span>
                                                <span>£${t.priceTicket.toFixed(2)}</span>
                                            </div>
                                            <div class="flex justify-between text-sm font-bold">
                                                <span>Bebida (valor bar)</span>
                                                <span>£${t.priceDrink.toFixed(2)}</span>
                                            </div>
                                        </div>

                                        <button
                                            class="btn-cream w-full py-4 rounded-lg font-black text-lg tracking-wide uppercase"
                                        >
                                            ${state.selectedTicket === t.id ? '✓ ELEGIDO' : 'ELEGIR →'}
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </section>

                    ${selected ? `
                        <div class="section-divider"></div>

                        <!-- Checkout -->
                        <section class="orange-bg py-24">
                            <div class="max-w-4xl mx-auto px-4">
                                <h2 class="big-text-cream text-4xl mb-12">RESUMEN</h2>

                                <div class="grid md:grid-cols-2 gap-8">
                                    <div class="poster-card">
                                        <p class="font-black text-gray-700 mb-4">TU PEDIDO</p>
                                        <div class="mb-4 pb-4 border-b-4 border-orange-400">
                                            <p class="text-2xl font-black mb-2">${selected.name}</p>
                                            <p class="price-huge">£${selected.priceBundle}</p>
                                        </div>

                                        <div class="flex items-center gap-3 mb-6">
                                            <span class="font-bold">Cantidad:</span>
                                            <button onclick="updateQuantity(-1)" class="btn-cream px-3 py-1 rounded font-black">−</button>
                                            <span class="font-black text-lg px-4">${state.quantity}</span>
                                            <button onclick="updateQuantity(1)" class="btn-cream px-3 py-1 rounded font-black">+</button>
                                        </div>

                                        <div class="text-center bg-white border-4 border-orange-400 rounded-lg p-4">
                                            <p class="text-xs font-bold text-gray-700 mb-2">TOTAL</p>
                                            <p class="price-huge text-orange-600">£${(selected.priceBundle * state.quantity).toFixed(2)}</p>
                                        </div>
                                    </div>

                                    <div class="flex flex-col justify-center">
                                        <div class="poster-card mb-4">
                                            <p class="font-black text-gray-700 mb-3">PAGO</p>
                                            <div class="orange-bg rounded-lg p-4 text-center mb-4">
                                                <p class="font-black cream">Stripe Checkout</p>
                                                <p class="text-sm cream">Tarjeta, Apple Pay, Google Pay</p>
                                            </div>
                                            <p class="text-xs text-gray-600 text-center">Recibirás un email con tu código QR único</p>
                                        </div>

                                        <button
                                            onclick="toggleCheckout()"
                                            class="btn-orange py-6 rounded-lg font-black text-lg tracking-wide uppercase"
                                        >
                                            CONTINUAR AL PAGO →
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </section>
                    ` : ''}

                    <!-- Footer -->
                    <section class="purple-bg border-t-4 border-orange-500 py-12">
                        <div class="max-w-7xl mx-auto px-4 text-center">
                            <p class="cream font-bold text-lg mb-2">📍 Simmons Bar • Holborn, London</p>
                            <p class="cream font-bold mb-2">🎤 @saladespecholondon</p>
                            <p class="gold text-sm font-bold">Última entrada 21:00 • 18+ • Dress code: BLANCO</p>
                        </div>
                    </section>

                    ${state.showCheckout ? `
                        <div style="position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 50;">
                            <div class="poster-card mx-4 max-w-md">
                                <h3 class="text-3xl font-black mb-4">Checkout</h3>
                                <p class="text-gray-700 font-semibold mb-6">
                                    En producción, aquí iría Stripe Checkout para pagos seguros.
                                </p>
                                <button
                                    onclick="toggleCheckout()"
                                    class="btn-orange w-full py-4 rounded-lg font-black"
                                >
                                    Cerrar Demo
                                </button>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        render();
    </script>
</body>
</html>
